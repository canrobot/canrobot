<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>깡통로봇 관제탑 🤖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap');
        
        :root { --primary-color: #0ea5e9; --bg-color: #f8fafc; --text-color: #334155; }
        
        /* 모바일 화면 높이 대응 (키보드 대응) */
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Noto Sans KR', sans-serif; 
            margin: 0; 
            height: 100vh; /* 기본 */
            height: 100dvh; /* 최신 모바일 대응 */
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }

        .title-font { font-family: 'Jua', sans-serif; }
        
        .listening { 
            animation: pulse 1.2s infinite; 
            background-color: #ef4444 !important; 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); 
            color: white !important;
            transform: scale(1.1);
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .camera-offline { background-image: repeating-linear-gradient(45deg, #1f2937 25%, transparent 25%, transparent 75%, #1f2937 75%, #1f2937), repeating-linear-gradient(45deg, #1f2937 25%, #111827 25%, #111827 75%, #1f2937 75%, #1f2937); background-position: 0 0, 10px 10px; background-size: 20px 20px; }

        /* 채팅창 자동 스크롤 영역 */
        #chat-history {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* 하단바 강제 고정 스타일 */
        footer {
            position: relative;
            z-index: 50;
            background: white;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            padding-bottom: env(safe-area-inset-bottom); /* 아이폰 하단 바 대응 */
        }
    </style>
</head>
<body>

    <!-- 1. 헤더 (상단 고정) -->
    <header class="px-4 py-3 border-b border-sky-200 bg-white flex justify-between items-center shrink-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-xl shadow-inner"><i class="fas fa-robot"></i></div>
            <div>
                <h1 class="title-font text-2xl text-sky-600 leading-none">깡통로봇 <span class="text-[10px] text-slate-300 font-sans align-top">v11.6.0</span></h1>
                <p class="text-[10px] text-slate-400 font-bold leading-none mt-1">AI FLEET COMMAND CENTER</p>
            </div>
        </div>
        <div class="flex flex-col items-end">
            <div class="flex items-center space-x-1 bg-emerald-50 px-2 py-1 rounded-full border border-emerald-100">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-[10px] text-emerald-600 font-bold">LIVE</span>
            </div>
            <span id="sync-time" class="text-[8px] text-slate-400 font-mono mt-0.5">READY</span>
        </div>
    </header>

    <!-- 2. 실시간 카메라 (상단 유지) -->
    <section class="relative w-full bg-slate-900 aspect-video shrink-0 border-b-2 border-slate-800 flex flex-col justify-center items-center camera-offline overflow-hidden">
        <div class="absolute top-2 left-2 z-10">
            <select id="camera-selector" class="bg-black/60 text-white text-[11px] font-bold py-1 px-2 rounded-md border border-slate-600 backdrop-blur-sm focus:outline-none">
                <option value="offline">📺 카메라 선택</option>
                <option value="kobuki">🐢 고부기 (거실)</option>
                <option value="walle">🤖 Wall-E (안방)</option>
            </select>
        </div>
        <img id="camera-feed" src="" class="w-full h-full object-contain hidden">
        <div id="camera-offline-icon" class="text-center text-slate-500 opacity-60"><i class="fas fa-video-slash text-4xl mb-2"></i><p class="text-xs font-bold tracking-wider">CAMERA OFFLINE</p></div>
    </section>

    <!-- 3. 채팅 영역 (이 부분만 스크롤됨) -->
    <main id="chat-history" class="p-4 space-y-4 bg-slate-50 no-scrollbar">
        <div class="text-left flex items-start space-x-2">
            <div class="w-8 h-8 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-sm shadow-sm mt-1"><i class="fas fa-robot"></i></div>
            <div class="inline-block p-3 rounded-2xl rounded-tl-sm text-sm bg-white border border-slate-200 text-slate-700 shadow-sm max-w-[85%]">
                사령관님, <b>입력창이 고정된 v11.6.0</b>입니다.<br>이제 대화가 길어져도 마이크 버튼이 사라지지 않아요! 🦾
            </div>
        </div>
    </main>

    <!-- 4. 하단 입력바 (절대 사라지지 않음) -->
    <footer class="p-3 shrink-0">
        <div class="flex items-center space-x-2 max-w-4xl mx-auto">
            <button id="mic-btn" class="w-14 h-14 shrink-0 rounded-full bg-sky-500 flex items-center justify-center text-white text-2xl shadow-lg active:scale-90 transition-all">
                <i class="fas fa-microphone"></i>
            </button>
            <div class="flex-1 relative">
                <input type="text" id="text-input" placeholder="메시지를 입력하세요..." class="w-full bg-slate-50 border border-slate-300 rounded-2xl pl-4 pr-12 py-3 text-sm focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-200 transition-all text-slate-700 shadow-inner">
                <button id="send-btn" class="absolute right-1 top-1/2 transform -translate-y-1/2 w-10 h-10 flex items-center justify-center text-sky-500 active:scale-90"><i class="fas fa-paper-plane text-lg"></i></button>
            </div>
        </div>
    </footer>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwDaArFRICsT8FYy5SqlgH63fNtM7GFOu-GZ7R1YE20FIMsfREotYZsIqPgG4EpUMzE/exec";
        let lastMsg = "";
        let audioEnabled = false;
        
        const chatHistory = document.getElementById('chat-history');
        const micBtn = document.getElementById('mic-btn');
        const textInput = document.getElementById('text-input');
        const syncTimeDisplay = document.getElementById('sync-time');

        // STT 로직
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            micBtn.onclick = () => {
                if(!audioEnabled) { window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); audioEnabled = true; }
                try { recognition.start(); micBtn.classList.add('listening'); } catch (e) { recognition.stop(); }
            };
            recognition.onresult = (e) => { const text = e.results[0][0].transcript; addChat("나", text); sendToBrain(text); };
            recognition.onend = () => micBtn.classList.remove('listening');
        }

        async function sendToBrain(query) {
            try { await fetch(`${GAS_URL}?query=${encodeURIComponent(query)}&t=${Date.now()}`, { mode: 'no-cors' }); } catch (e) {}
        }

        async function checkResponse() {
            try {
                const response = await fetch(`${GAS_URL}?action=read&t=${Date.now()}`);
                const data = (await response.text()).trim();
                syncTimeDisplay.innerText = "Sync: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
                if (!data || data === "" || data.includes("ONLINE")) return;

                let msg = data.includes('|') ? data.split('|').pop().trim() : data;
                if (msg && msg !== lastMsg && msg !== "-" && !/^(D:|A:|CMD:|Event:|OK:)/.test(msg)) {
                    if (lastMsg === "" && (msg.includes("v11.6.0") || msg.includes("환영합니다"))) { lastMsg = msg; return; }
                    addChat("깡통로봇", msg); lastMsg = msg;
                    if(audioEnabled) speak(msg);
                }
            } catch (e) {}
        }

        function speak(text) {
            const cleanText = text.replace(/[^\w\s가-힣ㄱ-ㅎㅏ-ㅣ.,!?~\'-]/g, '').replace(/치익-|삐빅/g, "").trim();
            if(!cleanText) return;
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'ko-KR'; utter.rate = 1.05; utter.pitch = 1.1;
            window.speechSynthesis.speak(utter);
        }

        function addChat(sender, text) {
            const div = document.createElement('div');
            div.className = sender === "나" ? "flex justify-end" : "flex items-start space-x-2 animate-in fade-in slide-in-from-left-2 duration-300";
            div.innerHTML = sender === "나" 
                ? `<div class="bg-sky-500 text-white p-3 rounded-2xl rounded-tr-sm text-sm max-w-[85%] shadow-sm">${text}</div>`
                : `<div class="w-8 h-8 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-sm shrink-0"><i class="fas fa-robot"></i></div>
                   <div class="bg-white border border-slate-200 text-slate-700 p-3 rounded-2xl rounded-tl-sm text-sm max-w-[85%] shadow-sm leading-relaxed">${text}</div>`;
            chatHistory.appendChild(div);
            // 최신 메시지로 스크롤 (강제)
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        document.getElementById('send-btn').onclick = () => { 
            if (textInput.value.trim() !== "") { 
                if(!audioEnabled) { audioEnabled = true; window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); }
                addChat("나", textInput.value); sendToBrain(textInput.value); textInput.value = ""; 
            } 
        };
        textInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('send-btn').click(); });
        setInterval(checkResponse, 2000);

        // 카메라 (기존)
        const cameraStreams = { "offline": "", "kobuki": "http://192.168.1.225:8080/stream?topic=/camera/image_raw", "walle": "http://192.168.1.100:8080/stream?topic=/camera/image_raw" };
        document.getElementById('camera-selector').addEventListener('change', (e) => {
            const url = cameraStreams[e.target.value];
            document.getElementById('camera-feed').src = url || "";
            document.getElementById('camera-feed').className = url ? "w-full h-full object-contain" : "hidden";
            document.getElementById('camera-offline-icon').className = url ? "hidden" : "text-center text-slate-500 opacity-60";
        });
    </script>
</body>
</html>
