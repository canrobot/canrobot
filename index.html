<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>깡통로봇 관제탑 🤖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap');
        :root { --primary-color: #0ea5e9; --bg-color: #f8fafc; --text-color: #334155; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Noto Sans KR', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .title-font { font-family: 'Jua', sans-serif; }
        
        /* ✨ 인사 모드 애니메이션 */
        .welcome-active { background: linear-gradient(135deg, #0ea5e9, #6366f1); animation: bg-pulse 2s infinite; }
        @keyframes bg-pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.2); } }
        
        .sparkle-eyes { animation: blink 0.5s infinite; color: #fbbf24 !important; text-shadow: 0 0 15px rgba(251, 191, 36, 0.8); }
        @keyframes blink { 0%, 100% { opacity: 1; transform: scale(1.1); } 50% { opacity: 0.5; transform: scale(0.9); } }

        #chat-history { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. 헤더 (상태에 따라 배경색 변경) -->
    <header id="main-header" class="px-4 py-3 border-b border-sky-200 bg-white flex justify-between items-center transition-colors duration-500 shrink-0 z-50">
        <div class="flex items-center space-x-3">
            <div id="robot-icon" class="w-10 h-10 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-xl shadow-inner">
                <i class="fas fa-robot"></i>
            </div>
            <div>
                <h1 class="title-font text-2xl text-sky-600 leading-none">깡통로봇 <span id="ver-tag" class="text-[10px] text-slate-300 font-sans align-top">v12.2.3</span></h1>
                <p id="status-text" class="text-[10px] text-slate-400 font-bold leading-none mt-1">SYSTEM READY</p>
            </div>
        </div>
        <button onclick="openSettings()" class="w-8 h-8 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center"><i class="fas fa-cog"></i></button>
    </header>

    <!-- 2. 실시간 카메라 -->
    <section class="relative w-full bg-slate-900 aspect-video shrink-0 border-b-2 border-slate-800 flex justify-center items-center overflow-hidden">
        <div id="welcome-banner" class="hidden absolute inset-0 z-20 bg-black/40 flex flex-col items-center justify-center text-white p-4">
            <div class="text-5xl mb-3 sparkle-eyes"><i class="fas fa-stars"></i> ✨ <i class="fas fa-stars"></i></div>
            <h2 class="title-font text-3xl">인사 모드 가동!</h2>
            <p class="text-sm opacity-80">현관으로 마중 나가는 중입니다...</p>
        </div>
        <img id="camera-feed" src="" class="w-full h-full object-contain hidden">
        <div class="text-slate-500 text-xs text-center"><i class="fas fa-video-slash text-3xl mb-2"></i><br>카메라를 연결해 주세요</div>
    </section>

    <!-- 3. 채팅 영역 -->
    <main id="chat-history" class="p-4 space-y-4 bg-slate-50"></main>

    <footer class="p-3 bg-white border-t">
        <div class="flex items-center space-x-2 max-w-4xl mx-auto">
            <button id="mic-btn" class="w-14 h-14 shrink-0 rounded-full bg-sky-500 flex items-center justify-center text-white text-2xl shadow-lg"><i class="fas fa-microphone"></i></button>
            <input type="text" id="text-input" placeholder="명령을 입력하세요..." class="flex-1 bg-slate-50 border border-slate-300 rounded-2xl px-4 py-3 text-sm">
        </div>
    </footer>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwDaArFRICsT8FYy5SqlgH63fNtM7GFOu-GZ7R1YE20FIMsfREotYZsIqPgG4EpUMzE/exec";
        let lastMsg = "";

        async function checkStatus() {
            try {
                const response = await fetch(`${GAS_URL}?action=read&row=21&t=${Date.now()}`);
                const data = (await response.text()).trim();
                if (!data) return;

                const msg = data.includes('|') ? data.split('|').pop().strip() : data;
                
                // UI 업데이트 (Welcome Mode 여부 판단)
                const header = document.getElementById('main-header');
                const robotIcon = document.getElementById('robot-icon');
                const banner = document.getElementById('welcome-banner');
                const statusText = document.getElementById('status-text');

                if (msg.includes("Welcome Mode")) {
                    header.classList.add('welcome-active');
                    robotIcon.querySelector('i').className = "fas fa-star sparkle-eyes";
                    banner.classList.remove('hidden');
                    statusText.innerText = "GREETING MISSION IN PROGRESS";
                } else {
                    header.classList.remove('welcome-active');
                    robotIcon.querySelector('i').className = "fas fa-robot";
                    banner.classList.add('hidden');
                    statusText.innerText = msg.includes("StandBy") ? "IDLE - WAITING COMMAND" : "ONLINE";
                }

                if (msg !== lastMsg && !msg.includes("Welcome Mode") && msg !== "-") {
                    addChat("꼬부기", msg);
                    lastMsg = msg;
                }
            } catch (e) {}
        }

        function addChat(sender, text) {
            const history = document.getElementById('chat-history');
            const div = document.createElement('div');
            div.className = "flex items-start space-x-2";
            div.innerHTML = `<div class="w-8 h-8 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-sm shrink-0"><i class="fas fa-robot"></i></div>
                             <div class="bg-white border border-slate-200 text-slate-700 p-3 rounded-2xl rounded-tl-sm text-sm max-w-[85%]">${text}</div>`;
            history.appendChild(div);
            history.scrollTop = history.scrollHeight;
        }

        setInterval(checkStatus, 2000);
    </script>
</body>
</html>
