<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>깡통로봇 관제탑 🤖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap');
        :root { --primary-color: #0ea5e9; --bg-color: #f8fafc; --text-color: #334155; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Noto Sans KR', sans-serif; margin: 0; height: 100vh; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .title-font { font-family: 'Jua', sans-serif; }
        .listening { animation: pulse 1.2s infinite; background-color: #ef4444 !important; transform: scale(1.1); box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); color: white !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #mic-btn { z-index: 999; position: relative; cursor: pointer; }
    </style>
</head>
<body class="flex flex-col h-full">

    <header class="px-4 py-3 border-b border-sky-200 bg-white flex justify-between items-center shadow-sm z-20 shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-xl shadow-inner"><i class="fas fa-robot"></i></div>
            <div>
                <h1 class="title-font text-2xl text-sky-600 leading-none">깡통로봇 <span class="text-[10px] text-slate-300 font-sans align-top">v10.1.1</span></h1>
                <p class="text-[10px] text-slate-400 font-bold leading-none mt-1">AI FLEET COMMAND CENTER</p>
            </div>
        </div>
        <div class="flex items-center space-x-1 bg-emerald-50 px-2 py-1 rounded-full border border-emerald-100">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
            <span class="text-[10px] text-emerald-600 font-bold">Online</span>
        </div>
    </header>

    <section class="relative w-full bg-slate-900 aspect-video shrink-0 shadow-md border-b-2 border-slate-800 flex flex-col justify-center items-center overflow-hidden">
        <div class="absolute top-2 left-2 z-10">
            <select id="camera-selector" class="bg-black/70 text-white text-xs font-bold py-1 px-2 rounded-md border border-slate-600 focus:outline-none">
                <option value="offline">📺 카메라 선택 안함</option>
                <option value="kobuki">🐢 고부기 (거실)</option>
                <option value="walle">🤖 Wall-E (안방)</option>
            </select>
        </div>
        <img id="camera-feed" src="" class="w-full h-full object-contain hidden">
        <div id="camera-offline-icon" class="text-center text-slate-500 opacity-60"><i class="fas fa-video-slash text-4xl mb-2"></i><p class="text-xs font-bold">CAMERA OFFLINE</p></div>
    </section>

    <main id="chat-history" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 bg-slate-50 no-scrollbar">
        <div class="text-left flex items-start space-x-2">
            <div class="w-8 h-8 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-sm mt-1"><i class="fas fa-robot"></i></div>
            <div class="p-3 rounded-2xl rounded-tl-sm text-sm bg-white border border-slate-200 text-slate-700 shadow-sm max-w-[85%] leading-relaxed">
                사령관님! 강제 초기화 로직을 보강한 <b>v10.1.1</b>입니다. <br>진단 중 상태에서 2초 이상 반응이 없으면 엔진을 강제로 재시작합니다. 다시 한번 눌러주세요! 🦾
            </div>
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-slate-200 shadow-lg shrink-0 pb-safe">
        <div id="debug-status" class="text-[10px] text-center mb-2 font-bold text-slate-400">마이크를 터치하여 대화 시작</div>
        
        <div class="flex items-center space-x-3">
            <button id="mic-btn" class="w-16 h-16 shrink-0 rounded-full bg-sky-500 flex items-center justify-center text-white text-3xl shadow-xl active:scale-90 transition-all">
                <i class="fas fa-microphone"></i>
            </button>
            
            <div class="flex-1 relative">
                <input type="text" id="text-input" placeholder="음성 또는 텍스트 입력..." class="w-full bg-slate-100 border border-slate-300 rounded-2xl pl-4 pr-12 py-4 text-sm focus:outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-200 transition-all text-slate-700">
                <button id="send-btn" class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center text-sky-500 active:scale-90"><i class="fas fa-paper-plane text-xl"></i></button>
            </div>
        </div>
    </footer>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwDaArFRICsT8FYy5SqlgH63fNtM7GFOu-GZ7R1YE20FIMsfREotYZsIqPgG4EpUMzE/exec";
        let lastMsg = "";
        let audioUnlocked = false;
        let watchdogTimer = null;

        const chatHistory = document.getElementById('chat-history');
        const micBtn = document.getElementById('mic-btn');
        const textInput = document.getElementById('text-input');
        const debugStatus = document.getElementById('debug-status');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                clearTimeout(watchdogTimer); // 💡 작동 시작 시 타이머 해제
                debugStatus.innerText = "마이크 가동 성공! 말씀하세요";
                debugStatus.className = "text-[10px] text-center mb-2 font-bold text-red-500";
                micBtn.classList.add('listening');
            };

            micBtn.addEventListener('click', function() {
                if (micBtn.classList.contains('listening')) {
                    recognition.stop();
                    return;
                }

                debugStatus.innerText = "진단 중... (응답 대기)";
                debugStatus.className = "text-[10px] text-center mb-2 font-bold text-slate-400";
                
                if (!audioUnlocked) {
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
                    audioUnlocked = true;
                }

                // 💡 [핵심] 2초 워치독 설정 - 모든 상태를 강제 리셋
                clearTimeout(watchdogTimer);
                watchdogTimer = setTimeout(() => {
                    if (!micBtn.classList.contains('listening')) {
                        debugStatus.innerText = "엔진 응답 없음 (강제 초기화 완료)";
                        debugStatus.className = "text-[10px] text-center mb-2 font-bold text-amber-500";
                        try { 
                            recognition.abort(); // 💡 멈춰있는 엔진을 강제로 죽임
                        } catch(e) {}
                        resetMicUI();
                    }
                }, 2000);

                try {
                    recognition.start();
                    if (navigator.vibrate) navigator.vibrate(50);
                } catch (err) {
                    debugStatus.innerText = "이미 실행 중이거나 초기 오류";
                    resetMicUI();
                }
            });

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                addChat("나", transcript);
                sendToBrain(transcript);
                debugStatus.innerText = "분석 시작...";
            };

            recognition.onerror = (event) => {
                debugStatus.innerText = "에러: " + event.error;
                resetMicUI();
            };

            recognition.onend = () => resetMicUI();

            function resetMicUI() {
                clearTimeout(watchdogTimer);
                micBtn.classList.remove('listening');
                if(!debugStatus.innerText.includes('에러') && !debugStatus.innerText.includes('없음')) {
                   debugStatus.innerText = "마이크를 터치하여 대화 시작";
                   debugStatus.className = "text-[10px] text-center mb-2 font-bold text-slate-400";
                }
            }
        } else {
            micBtn.style.opacity = "0.5";
            debugStatus.innerText = "이 브라우저는 음성 인식을 지원하지 않습니다";
        }

        async function sendToBrain(query) {
            try { await fetch(`${GAS_URL}?query=${encodeURIComponent(query)}`); } catch (e) {}
        }

        async function checkResponse() {
            try {
                const response = await fetch(`${GAS_URL}?action=read`);
                const data = await response.text();
                const [state, msg] = data.split('|');
                const isMachineData = /^[DA]:|^CMD:|^Event:/.test(msg);
                if (msg && msg !== lastMsg && msg !== "-" && msg !== "" && !isMachineData) {
                    addChat("깡통로봇", msg);
                    lastMsg = msg;
                    if (audioUnlocked) speak(msg);
                }
            } catch (e) {}
        }

        function speak(text) {
            const cleanText = text.replace(/[^\w\s가-힣ㄱ-ㅎㅏ-ㅣ.,!?~\'-]/g, '').replace(/치익-|삐빅/g, "").trim();
            if(!cleanText) return;
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'ko-KR';
            utter.rate = 1.05; utter.pitch = 1.1;
            window.speechSynthesis.speak(utter);
        }

        function addChat(sender, text) {
            const div = document.createElement('div');
            div.className = sender === "나" ? "flex justify-end mb-2" : "flex items-start space-x-2 mb-2 mt-4";
            div.innerHTML = sender === "나" 
                ? `<div class="bg-sky-500 text-white p-3 rounded-2xl rounded-tr-sm text-sm max-w-[85%] shadow-sm">${text}</div>`
                : `<div class="w-8 h-8 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-sm shadow-sm mt-1"><i class="fas fa-robot"></i></div>
                   <div class="bg-white border border-slate-200 p-3 rounded-2xl rounded-tl-sm text-sm max-w-[85%] shadow-sm leading-relaxed">${text}</div>`;
            chatHistory.appendChild(div);
            setTimeout(() => chatHistory.scrollTop = chatHistory.scrollHeight, 50);
        }

        document.getElementById('send-btn').onclick = () => {
            if (textInput.value.trim() !== "") {
                if (!audioUnlocked) {
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
                    audioUnlocked = true;
                }
                addChat("나", textInput.value);
                sendToBrain(textInput.value);
                textInput.value = "";
            }
        };

        setInterval(checkResponse, 2500);
    </script>
</body>
</html>
