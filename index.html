<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>깡통로봇 관제탑 🤖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap');
        :root { --primary-color: #0ea5e9; --bg-color: #f8fafc; --text-color: #334155; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Noto Sans KR', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        .title-font { font-family: 'Jua', sans-serif; }
        .listening { animation: pulse 1.2s infinite; background-color: #ef4444 !important; transform: scale(1.1); box-shadow: 0 0 20px rgba(239,68,68,0.5); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .analyzing { color: #f59e0b !important; font-weight: bold; }
        .error-status { color: #dc2626 !important; font-weight: bold; }
        .interim-text { color: #94a3b8; font-style: italic; }
    </style>
</head>
<body class="flex flex-col h-full">

    <header class="px-4 py-3 border-b border-sky-200 bg-white flex justify-between items-center shadow-sm shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-xl"><i class="fas fa-robot"></i></div>
            <div>
                <h1 class="title-font text-2xl text-sky-600 leading-none">깡통로봇 <span class="text-[10px] text-slate-300 font-sans align-top">v9.4.0</span></h1>
                <p class="text-[10px] text-slate-400 font-bold mt-1">AI FLEET VOICE MASTER</p>
            </div>
        </div>
        <div id="connection-status" class="flex items-center space-x-1 bg-emerald-50 px-2 py-1 rounded-full border border-emerald-100">
            <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
            <span class="text-[10px] text-emerald-600 font-bold">시스템 정상</span>
        </div>
    </header>

    <!-- 카메라 영역 -->
    <section class="relative w-full bg-slate-900 aspect-video shrink-0 shadow-md flex justify-center items-center overflow-hidden">
        <div class="absolute top-2 left-2 z-10">
            <select id="camera-selector" class="bg-black/70 text-white text-[11px] font-bold py-1 px-2 rounded-md border border-slate-600 focus:outline-none">
                <option value="offline">📺 카메라 선택</option>
                <option value="kobuki">🐢 꼬부기 전방</option>
                <option value="depth">🌑 Kinect Depth</option>
            </select>
        </div>
        <div class="text-slate-500 text-center"><i class="fas fa-video-slash text-4xl mb-2"></i><p class="text-xs font-bold">CAMERA OFFLINE</p></div>
    </section>

    <!-- 채팅 및 답변 로그 -->
    <main id="chat-history" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 bg-slate-50 no-scrollbar">
        <div class="text-center"><span id="init-msg" class="text-[10px] bg-slate-200 text-slate-500 px-3 py-1 rounded-full font-bold">대화를 시작할 준비가 되었습니다</span></div>
    </main>

    <!-- 하단 음성 컨트롤 -->
    <footer class="p-4 bg-white border-t border-slate-200 shadow-lg">
        <div class="flex flex-col items-center space-y-3">
            <div id="voice-status" class="text-xs font-bold text-slate-400 text-center px-4">마이크를 누르면 대화가 시작됩니다</div>
            
            <div class="flex items-center w-full space-x-3">
                <button id="mic-btn" class="w-16 h-16 shrink-0 rounded-full bg-sky-500 flex items-center justify-center text-white text-3xl shadow-xl active:scale-95 transition-all">
                    <i class="fas fa-microphone"></i>
                </button>
                
                <div class="flex-1 relative">
                    <input type="text" id="text-input" placeholder="명령을 입력하세요..." class="w-full bg-slate-100 border border-slate-200 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-sky-200">
                    <button id="send-btn" class="absolute right-2 top-1/2 -translate-y-1/2 text-sky-500 p-2"><i class="fas fa-paper-plane text-xl"></i></button>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwDaArFRICsT8FYy5SqlgH63fNtM7GFOu-GZ7R1YE20FIMsfREotYZsIqPgG4EpUMzE/exec";
        let lastMsg = "";
        let isVoiceMode = false;
        let isSpeaking = false;
        let isAnalyzing = false;
        let finalTranscript = "";
        
        const chatHistory = document.getElementById('chat-history');
        const micBtn = document.getElementById('mic-btn');
        const voiceStatus = document.getElementById('voice-status');
        const textInput = document.getElementById('text-input');

        // 🎙️ 음성 인식 엔진 설정
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;

        if (recognition) {
            recognition.lang = 'ko-KR';
            recognition.interimResults = true; // 실시간 결과 확인 활성화
            recognition.continuous = false;   // 모바일 안정성을 위해 단발성 인식 사용

            micBtn.onclick = () => {
                if (!isVoiceMode) {
                    startVoiceMode();
                } else {
                    // 💡 [핵심수정] 이미 켜진 상태에서 누르면 즉시 전송 시도
                    if (finalTranscript.trim()) {
                        processRecognitionResult(finalTranscript);
                    } else {
                        stopVoiceMode();
                    }
                }
            };

            recognition.onresult = (event) => {
                let interimTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript = event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                
                // 실시간으로 입력창에 가이드 텍스트 표시
                textInput.value = finalTranscript || interimTranscript;
                textInput.className = "w-full bg-slate-100 border border-slate-200 rounded-2xl px-4 py-3 text-sm interim-text";

                if (finalTranscript.trim() && event.results[event.results.length - 1].isFinal) {
                    processRecognitionResult(finalTranscript);
                }
            };

            recognition.onerror = (event) => {
                console.log("Recognition Error:", event.error);
                if (event.error === 'not-allowed') {
                    voiceStatus.innerText = "🚨 마이크 권한이 거부되었습니다. 설정에서 허용해 주세요.";
                    voiceStatus.className = "text-xs font-bold error-status";
                    stopVoiceMode();
                }
            };

            recognition.onend = () => {
                // 인식이 끝났는데 분석 중이 아니면 다시 시작 (상시 모드 유지)
                if (isVoiceMode && !isSpeaking && !isAnalyzing) {
                    setTimeout(() => { 
                        if (isVoiceMode && !isSpeaking && !isAnalyzing) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 300);
                }
            };
        }

        function processRecognitionResult(text) {
            if (!text.trim()) return;
            
            isAnalyzing = true;
            finalTranscript = "";
            addChat("나", text);
            sendToBrain(text);
            
            textInput.value = "";
            textInput.className = "w-full bg-slate-100 border border-slate-200 rounded-2xl px-4 py-3 text-sm";
            
            voiceStatus.innerText = "분석 중... 잠시만 기다려주세요";
            voiceStatus.className = "text-xs font-bold analyzing";
            
            try { recognition.stop(); } catch(e) {}
        }

        async function startVoiceMode() {
            try {
                isVoiceMode = true;
                isAnalyzing = false;
                finalTranscript = "";
                micBtn.classList.add('listening');
                voiceStatus.innerText = "듣고 있습니다... 한 번 더 누르면 전송됩니다";
                voiceStatus.className = "text-xs font-bold text-red-500";
                
                // 오디오 엔진 잠금 해제
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
                recognition.start();
            } catch (err) {
                console.error("Mic start failed", err);
            }
        }

        function stopVoiceMode() {
            isVoiceMode = false;
            isAnalyzing = false;
            micBtn.classList.remove('listening');
            voiceStatus.innerText = "마이크가 꺼졌습니다";
            voiceStatus.className = "text-xs font-bold text-slate-400";
            textInput.value = "";
            try { recognition.stop(); } catch(e) {}
        }

        async function sendToBrain(query) {
            try { await fetch(`${GAS_URL}?query=${encodeURIComponent(query)}`); } catch (e) {}
        }

        async function checkResponse() {
            try {
                const response = await fetch(`${GAS_URL}?action=read`);
                const data = await response.text();
                const [state, msg] = data.split('|');

                const isCommand = /^[DA]:|^CMD:|^Event:/.test(msg);

                if (msg && msg !== lastMsg && msg !== "-" && msg !== "" && !isCommand) {
                    isAnalyzing = false; 
                    addChat("깡통로봇", msg);
                    lastMsg = msg;
                    speak(msg);
                }
            } catch (e) {}
        }

        function addChat(sender, text) {
            const div = document.createElement('div');
            div.className = sender === "나" ? "flex justify-end mb-2" : "flex items-start space-x-2 mb-2 mt-4";
            div.innerHTML = sender === "나" 
                ? `<div class="bg-sky-500 text-white p-3 rounded-2xl rounded-tr-sm text-sm max-w-[85%] shadow-sm">${text}</div>`
                : `<div class="w-8 h-8 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 text-sm"><i class="fas fa-robot"></i></div>
                   <div class="bg-white border border-slate-200 p-3 rounded-2xl rounded-tl-sm text-sm max-w-[85%] shadow-sm leading-relaxed">${text}</div>`;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function speak(text) {
            isSpeaking = true;
            isAnalyzing = false;
            if (recognition) try { recognition.stop(); } catch(e) {} 
            
            const cleanText = text.replace(/[^\w\s가-힣ㄱ-ㅎㅏ-ㅣ.,!?~\'-]/g, '').replace(/치익-|삐빅/g, "").trim();
            const utter = new SpeechSynthesisUtterance(cleanText);
            utter.lang = 'ko-KR';
            utter.rate = 1.05;
            utter.pitch = 1.1;

            utter.onend = () => {
                isSpeaking = false;
                if (isVoiceMode && !isAnalyzing) {
                    voiceStatus.innerText = "다시 듣고 있습니다... 말씀해 주세요";
                    voiceStatus.className = "text-xs font-bold text-red-500";
                    setTimeout(() => { 
                        if (isVoiceMode && !isSpeaking && !isAnalyzing) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 500);
                }
            };

            window.speechSynthesis.speak(utter);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        }

        document.getElementById('send-btn').onclick = () => {
            const val = textInput.value.trim();
            if (val !== "") {
                processRecognitionResult(val);
            }
        };

        setInterval(checkResponse, 2500);
    </script>
</body>
</html>
